  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Install Banner -->
    <div id="install-banner-container" style="display:none; position:fixed; bottom:0; left:0; width:100%; background-color:hsl(289,80%,29%); color:white; padding:12px; z-index:1000; box-shadow:0 -2px 5px rgba(0,0,0,0.2);">
      <div style="display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto;">
        <span id="install-banner-text" style="font-size:16px; margin-right:15px; line-height:1.4;">Instale nosso app para uma melhor experiência!</span>
        <div>
          <button id="install-pwa-btn" style="padding:8px 16px; font-weight:bold; background-color:hsl(289,90%,45%); color:white; border:none; border-radius:5px; cursor:pointer; margin-right:10px;">
            Instalar
          </button>
          <button id="dismiss-pwa-btn" style="background:none; border:none; color:rgba(255,255,255,0.7); cursor:pointer; font-size:18px;">
            &times;
          </button>
        </div>
      </div>
    </div>

    <script>
      (function() {
        let deferredPrompt;
        const installButton = document.getElementById('install-pwa-btn');
        const dismissButton = document.getElementById('dismiss-pwa-btn');
        const bannerContainer = document.getElementById('install-banner-container');
        const installText = document.getElementById('install-banner-text');
        if (!installButton || !dismissButton || !bannerContainer || !installText) { return; }
        if (window.matchMedia('(display-mode: standalone)').matches) {
          bannerContainer.style.display = 'none'; return;
        }
        const isIOS_Safari = () => {
          const ua = window.navigator.userAgent;
          const isIOS = /iPad|iPhone|iPod/.test(ua);
          const isSafari = /AppleWebKit/.test(ua) && !/CriOS/.test(ua) && !/GSAiOS/.test(ua);
          return isIOS && isSafari;
        };
        if (isIOS_Safari()) {
          installText.innerHTML = "Para instalar: toque em <strong>Compartilhar</strong> e depois em <strong>Adicionar à Tela de Início</strong>.";
          installButton.style.display = 'none';
          bannerContainer.style.display = 'block';
          dismissButton.addEventListener('click', () => { bannerContainer.style.display = 'none'; });
        } else {
          window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            bannerContainer.style.display = 'block';
          });
          installButton.addEventListener('click', async () => {
            bannerContainer.style.display = 'none';
            if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
          });
          dismissButton.addEventListener('click', () => { bannerContainer.style.display = 'none'; });
        }
        window.addEventListener('appinstalled', () => {
          bannerContainer.style.display = 'none'; deferredPrompt = null;
        });
      })();
    </script>
  </body>
